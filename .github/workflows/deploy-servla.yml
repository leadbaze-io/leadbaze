name: 🚀 Deploy LeadFlow na Servla

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔍 Type check
      run: npm run type-check
      
    - name: 🏗️ Build application
      run: npm run build:prod
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_N8N_WEBHOOK_URL: ${{ secrets.VITE_N8N_WEBHOOK_URL }}
        VITE_APP_ENV: production
        VITE_DEBUG_MODE: false
        
    - name: 📁 Create deployment package
      run: |
        tar -czf leadflow-deploy.tar.gz dist/ deploy-full-servla.sh check-deployment.sh nginx-servla.conf env.example
        
    - name: 🔑 Setup SSH connection
      run: |
        ssh-keyscan -H ${{ secrets.SERVLA_HOST }} >> ~/.ssh/known_hosts
        
    - name: 🚀 Deploy to Servla
      run: |
        # Criar diretório temporário
        sshpass -p '${{ secrets.SERVLA_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVLA_PORT }} ${{ secrets.SERVLA_USERNAME }}@${{ secrets.SERVLA_HOST }} "
          mkdir -p /tmp/leadflow-deploy
          cd /tmp/leadflow-deploy
        "
        
        # Enviar arquivo de deploy
        sshpass -p '${{ secrets.SERVLA_PASSWORD }}' scp -o StrictHostKeyChecking=no -P ${{ secrets.SERVLA_PORT }} leadflow-deploy.tar.gz ${{ secrets.SERVLA_USERNAME }}@${{ secrets.SERVLA_HOST }}:/tmp/leadflow-deploy/
        
        # Executar deploy
        sshpass -p '${{ secrets.SERVLA_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVLA_PORT }} ${{ secrets.SERVLA_USERNAME }}@${{ secrets.SERVLA_HOST }} "
          cd /tmp/leadflow-deploy
          tar -xzf leadflow-deploy.tar.gz
          chmod +x deploy-full-servla.sh
          ./deploy-full-servla.sh --auto
          chmod +x check-deployment.sh
          ./check-deployment.sh
          cd /
          rm -rf /tmp/leadflow-deploy
        "
          
    - name: ✅ Deploy verification
      run: |
        # Verificar se a aplicação está rodando
        sshpass -p '${{ secrets.SERVLA_PASSWORD }}' ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVLA_PORT }} ${{ secrets.SERVLA_USERNAME }}@${{ secrets.SERVLA_HOST }} "
          if curl -s http://localhost/health | grep -q 'healthy'; then
            echo '✅ Deploy successful!'
            exit 0
          else
            echo '❌ Deploy failed!'
            exit 1
          fi
        "

